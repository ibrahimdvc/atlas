  .ring { position:relative; width:50px; height:50px; margin:0 auto 4px; border-radius:50%;
    background:conic-gradient(var(--c,#6fd66f) calc(var(--p,80)*1%), rgba(255,255,255,.35) 0);

    display:flex; align-items:center; justify-content:center; transition:background .5s; }

<script>
'use strict';
const $ = id => document.getElementById(id);
const VIDEO_FILES = {
  idle:'normal duruş.mp4',
  play:'oyun isteme.mp4',
  drink:'su-icme.mp4',
  paw:'pati hareketi.mp4',
  eat:'mama-yeme.mp4',
  pet:'sevme.mp4',
  run:'kosma.mp4',
  sleep:'uyuma.mp4',
  hungry:'acikti-bekleme.mp4',
  thirsty:'susama.mp4',
  tired:'esneme.mp4',
  toilet:'tuvalet-arama.mp4',
  toyplay:'pelus-oynama2.mp4'
};
const VIDEO_PRELOAD_ORDER = ['pet','paw','eat','drink','run','play','sleep','hungry','thirsty','tired','toilet','toyplay'];
const SFX_FILE = 'atlas_sfx_pack.mp3';
const SFX = {
  paw:{src:'sesler/pati hareketi yaparken sesi.mp3',duration:1.15,volume:.28},
  petTap:{src:SFX_FILE,start:.15,duration:.45,volume:.22},
  bark:{src:SFX_FILE,start:1.55,duration:.85,volume:.42},
  reward:{src:SFX_FILE,start:6.25,duration:1.2,volume:.42},
  sleep:{src:SFX_FILE,start:8.05,duration:1.35,volume:.34},
  eat:{src:'sesler/magnific_kopek-mama-yeme-sesi_nT65AzhYQD.mp3',volume:.48},
  drink:{src:'sesler/magnific_kopek-su-icme-sesi_mCpPIq8hJQ.mp3',volume:.46},
  run:{src:'sesler/magnific_poddle-kopek-kosma-sesi-p_rlQ0kn5xtc.mp3',volume:.34},
  toilet:{src:'sesler/magnific_poddle-kopek-cis-yapma-se_62wC2poiJO.mp3',volume:.4}
};
const videos = {};
const bank = $('videoBank');
for (const [key, src] of Object.entries(VIDEO_FILES)) {
  const v = document.createElement('video');
  v.dataset.src = src;
  v.muted = true; v.loop = true; v.playsInline = true; v.preload = 'none';
  bank.appendChild(v); videos[key] = v;
}
// --- Tam on-yukleme: oyun baslamadan once TUM video+ses dosyalari indirilir, ---
// --- boylece oynanis sirasinda hicbir klip icin ag/tampon beklemesi olmaz (donma/kasma olmaz). ---
const loadFill = $('loadBarFill'), loadText = $('loadText'), startBtnEl = $('startBtn');
const AUDIO_SRCS = [...new Set(Object.values(SFX).map(c => c.src))];
const ASSET_LIST = [
  ...Object.entries(VIDEO_FILES).map(([key,src]) => ({type:'video', key, src})),
  ...AUDIO_SRCS.map(src => ({type:'audio', src}))
];
const audioBlobUrls = {};
function buildSfxPools(){
  sfxPools = Object.fromEntries(Object.entries(SFX).map(([name,cue]) => [name, {
    index:0,
    items:Array.from({length:2}, () => {
      const a = new Audio(audioBlobUrls[cue.src] || cue.src);
      a.preload = 'auto';
      a.playsInline = true;
      return a;
    })
  }]));
}
async function preloadAll(){
  const progressMap = new Map();
  function recompute(){
    let loaded=0, total=0;
    for (const p of progressMap.values()){ loaded+=p.loaded; total+=p.total; }
    const pct = total ? Math.min(100, Math.round(loaded/total*100)) : 0;
    if (loadFill) loadFill.style.width = pct+'%';
    if (loadText) loadText.textContent = 'Yükleniyor… %'+pct;
    return pct;
  }
  let idx = 0;
  const CONCURRENCY = 4;
  async function worker(){
    while (idx < ASSET_LIST.length){
      const item = ASSET_LIST[idx++];
      const estTotal = item.type === 'video' ? 3200000 : 60000;
      progressMap.set(item.src+'|'+item.type, {loaded:0, total:estTotal});
      try {
        const res = await fetch(encodeURI(item.src));
        if (!res.ok) throw new Error('HTTP '+res.status);
        const len = parseInt(res.headers.get('content-length')||'0',10) || estTotal;
        progressMap.get(item.src+'|'+item.type).total = len;
        const reader = res.body.getReader();
        const chunks = []; let received = 0;
        for(;;){
          const {done, value} = await reader.read();
          if (done) break;
          chunks.push(value); received += value.length;
          progressMap.get(item.src+'|'+item.type).loaded = received;
          recompute();
        }
        const mime = item.type === 'video' ? 'video/mp4' : 'audio/mpeg';
        const blob = new Blob(chunks, {type:mime});
        if (blob.size === 0) throw new Error('bos dosya alindi');
        const url = URL.createObjectURL(blob);
        if (item.type === 'video'){
          const v = videos[item.key];
          await new Promise(res2 => {
            let done = false;
            const finish = () => { if (done) return; done = true; v.removeEventListener('loadeddata', finish); resolve_(); };
            function resolve_(){ res2(); }
            v.addEventListener('loadeddata', finish, {once:true});
            v.preload = 'auto';
            v.src = url;
            v.load();
            // guvenlik agi: bazi taraytcilarda olay kacabilir, sonsuza dek beklemeyelim
            setTimeout(finish, 4000);
          });
        } else {
          audioBlobUrls[item.src] = url;
        }
      } catch(e){
        // ag/format hatasinda dogrudan orijinal dosya yoluna dus (eski calisan yontem), ilerlemeyi yine de tamamla say
        const p = progressMap.get(item.src+'|'+item.type);
        if (p) p.loaded = p.total;
        if (item.type === 'video'){
          const v = videos[item.key];
          v.preload = 'auto';
          v.src = item.src;
          v.load();
        }
        recompute();
      }
    }
  }
  await Promise.all(Array.from({length:CONCURRENCY}, worker));
  buildSfxPools();
  recompute();
  if (startBtnEl){
    startBtnEl.disabled = false;
    if (loadText) loadText.textContent = 'Hazır!';
  }
}

const cvs = $('dogCanvas'), ctx = cvs.getContext('2d', { willReadFrequently:true });
const splashCvs = $('splashCanvas'), splashCtx = splashCvs.getContext('2d', { willReadFrequently:true });
const petHit = $('petHit');
const toyImg = $('toyImg');
const work = document.createElement('canvas'), wctx = work.getContext('2d', { willReadFrequently:true });
work.width = cvs.width; work.height = cvs.height;
let clip = 'idle', facing = 1, started = false, splashAlive = true;
let sfxReady=false;
let sfxPools = {};

async function unlockSfx(){
  if (sfxReady) return;
  const allPlayers = Object.values(sfxPools).flatMap(pool => pool.items);
  await Promise.all(allPlayers.map(async a => {
    try {
      a.volume = 0;
      await a.play();
      a.pause();
      a.currentTime = 0;
    } catch(e) {}
  }));
  sfxReady = true;
}
function playSfx(name){
  if (!sfxReady || !SFX[name]) return;
  const cue = SFX[name];
  const pool = sfxPools[name];
  const a = pool.items[pool.index++ % pool.items.length];
  a.pause();
  a.currentTime = cue.start || 0;
  a.volume = cue.volume;
  a.play().catch(()=>{});
  clearTimeout(a._stopTimer);
  if (cue.duration) {
    a._stopTimer = setTimeout(() => {
      a.pause();
      a.currentTime = 0;
    }, cue.duration * 1000);
  }
}

function setClip(next, face) {
  if (face) facing = face;
  if (clip === next) return;
  const prev = videos[clip];
  if (prev) prev.pause();
  clip = next;
  const v = videos[clip];
  if (v) {
    const playCurrent = () => { if (clip === next) v.play().catch(()=>{}); };
    try { if (v.readyState >= 2) v.currentTime = 0; } catch(e) {}
    if (started) {
      if (v.readyState >= 2) playCurrent();
      else v.addEventListener('canplay', playCurrent, {once:true});
      if (next === 'paw') playSfx('paw');
    }
  }
}
function stopAllVideos() {
  Object.values(videos).forEach(v => {
    v.pause();
    v.currentTime = 0;
  });
}
function softCleanStudioWhite(img) {
  const d = img.data;
  for (let i=0; i<d.length; i+=4) {
    const r=d[i], g=d[i+1], b=d[i+2];
    const max=Math.max(r,g,b), min=Math.min(r,g,b);
    const spread=max-min;
    const brightness=(r+g+b)/3;
    if (brightness < 188 || spread > 56) continue;

    const neutral = 1 - Math.min(1, spread / 56);
    const lightKey = Math.min(1, Math.max(0, (brightness - 188) / 62));
    const whiteKey = Math.min(1, Math.max(0, (brightness - 212) / 30));
    const key = neutral * lightKey;
    const shadowKeep = Math.min(1, Math.max(0, (236 - brightness) / 48));
    const edgeFade = Math.max(0, neutral * whiteKey - shadowKeep * .24);
    const clean = Math.min(1, key * .5);

    d[i] = r + (255-r) * clean;
    d[i+1] = g + (255-g) * clean;
    d[i+2] = b + (255-b) * clean;
    d[i+3] = d[i+3] * (1 - edgeFade * .96);
  }
  return img;
}
function drawDog(targetCtx, targetCanvas) {
  const v = videos[clip] || videos.idle;
  targetCtx.clearRect(0,0,targetCanvas.width,targetCanvas.height);
  if (!v.videoWidth) return;
  wctx.clearRect(0,0,work.width,work.height);
  const scale = Math.min(work.width / v.videoWidth, work.height / v.videoHeight);
  const dw = Math.round(v.videoWidth * scale);
  const dh = Math.round(v.videoHeight * scale);
  const dx = (work.width - dw)/2, dy = work.height - dh + 10;
  wctx.save();
  if (facing < 0) { wctx.translate(work.width,0); wctx.scale(-1,1); wctx.drawImage(v, work.width-dx-dw, dy, dw, dh); }
  else wctx.drawImage(v, dx, dy, dw, dh);
  wctx.restore();
  const cleaned = wctx.getImageData(0,0,work.width,work.height);
  wctx.putImageData(softCleanStudioWhite(cleaned),0,0);
  targetCtx.drawImage(work,0,0,targetCanvas.width,targetCanvas.height);
}

const DEFAULT_NEEDS = { yemek:78, su:74, enerji:82, oyun:55, tuvalet:70, sevgi:62 };
const DECAY = { yemek:.32, su:.42, enerji:.22, oyun:.5, tuvalet:.38, sevgi:.3 };
const SAVE_KEY = 'atlas-oyunu-save-v1';
const needs = Object.assign({}, DEFAULT_NEEDS);
let paws=0, bondXP=0, bondLevel=1, mood='mutlu', action=null, sleeping=false;

// ---- Kalicilik: ihtiyaclar/pati/bag seviyesi kapatilip acilsa bile korunur. ----
// Uzakta gecen sure kadar ihtiyaclar da geriye dogru azaltilir (gercekci "seni ozledim" hissi).
function loadSave(){
  let raw;
  try { raw = localStorage.getItem(SAVE_KEY); } catch(e) { return null; }
  if (!raw) return null;
  try {
    const data = JSON.parse(raw);
    if (!data || typeof data !== 'object' || !data.needs) return null;
    return data;
  } catch(e) { return null; }
}
function applySave(data){
  for (const k in DEFAULT_NEEDS){
    const v = data.needs[k];
    needs[k] = (typeof v === 'number' && isFinite(v)) ? v : DEFAULT_NEEDS[k];
  }
  paws = (typeof data.paws === 'number' && isFinite(data.paws)) ? data.paws : 0;
  bondXP = (typeof data.bondXP === 'number' && isFinite(data.bondXP)) ? data.bondXP : 0;
  bondLevel = (typeof data.bondLevel === 'number' && isFinite(data.bondLevel) && data.bondLevel >= 1) ? data.bondLevel : 1;
  const savedAt = (typeof data.ts === 'number' && isFinite(data.ts)) ? data.ts : Date.now();
  const awaySec = Math.max(0, (Date.now() - savedAt) / 1000);
  const cappedSec = Math.min(awaySec, 24*3600); // 1 gunden fazlasi zaten hepsini 0'a indirir, sinirlamaya gerek yok ama guvenlik icin
  for (const k in needs) needs[k] = Math.max(0, needs[k] - DECAY[k]*cappedSec);
  return awaySec;
}
function saveState(){
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({ needs, paws, bondXP, bondLevel, ts: Date.now() }));
  } catch(e) { /* localStorage yoksa (gizli sekme vb.) sessizce yoksay */ }
}
let welcomeBackMsg = null;
(function initSave(){
  const data = loadSave();
  if (!data) return;
  const awaySec = applySave(data);
  if (awaySec > 60*30) {
    const h = Math.floor(awaySec/3600);
    welcomeBackMsg = h >= 1 ? `Atlas seni ${h} saattir bekliyordu!` : 'Atlas seni özledi!';
  }
})();
addEventListener('visibilitychange', () => { if (document.hidden) saveState(); });
addEventListener('pagehide', saveState);
setInterval(saveState, 8000);
let dogX=0, targetX=0, movingCb=null, t=0, actionTimer=0;
const dogWrap=$('dogWrap'), shadow=$('dogShadow'), bubble=$('bubble'), toastEl=$('toast');
const playMenu=$('playMenu'), ballEl=$('ball');
const installTip=$('installTip'), installText=$('installText'), installClose=$('installClose');
let installPromptEvent=null;
const FILLC = v => v>55 ? '#6fd66f' : v>28 ? '#ffc14d' : '#ff6b6b';
const URGENT_BTN = { yemek:'btnYemek', su:'btnSu', oyun:'btnOyun', tuvalet:'btnTuvalet', enerji:'btnUyku' };
const lastNeedVal = {};
function updateHUD(){
  for (const k in needs){
    const el=$('n-'+k), v=Math.round(needs[k]), ring=el.querySelector('.ring');
    ring.style.setProperty('--p', v);
    ring.style.setProperty('--c', FILLC(v));
    el.classList.toggle('low', v<28);
    if (lastNeedVal[k]!==undefined && Math.abs(lastNeedVal[k]-v) >= 8){
      el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump');
      setTimeout(()=>el.classList.remove('bump'), 260);
    }
    lastNeedVal[k]=v;
    const btnId = URGENT_BTN[k];
    if (btnId){ const btn=$(btnId); if (btn) btn.classList.toggle('urgent', v<28); }
  }
  $('paws').textContent=paws; $('bondLv').textContent='Bağ Sv. '+bondLevel;
}
let toastTimer;
function toast(m){ toastEl.textContent=m; toastEl.style.opacity=1; clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.style.opacity=0,2200); }
function fx(ch,x,y,cls='fx'){ const d=document.createElement('div'); d.className=cls; d.textContent=ch; d.style.left=x+'px'; d.style.top=y+'px'; document.body.appendChild(d); setTimeout(()=>d.remove(),1400); }
function earnPaws(n,x=innerWidth/2-30,y=innerHeight*.4){ paws+=n; bondXP+=n; playSfx('reward'); if(bondXP>=bondLevel*100){bondXP=0; bondLevel++; toast('Bağ seviyesi arttı! Sv.'+bondLevel);} fx('+'+n+' 🐾',x,y,'floatpt'); saveState(); }

let lastBubble='';
function setBubble(k){ if(k===lastBubble) return; lastBubble=k; const a=TEXT[k]||TEXT.mutlu; bubble.textContent=a[Math.floor(Math.random()*a.length)]; }
function placeBubble(){
  const portraitMobile = innerWidth <= 560 && innerHeight > innerWidth;
  if (!portraitMobile) {
    bubble.style.left = '';
    bubble.style.right = '';
    bubble.style.top = '';
    bubble.style.transform = '';
    return;
  }
  const r = dogWrap.getBoundingClientRect();
  const b = bubble.getBoundingClientRect();
  const topLimit = 76 + (window.visualViewport ? Math.max(0, window.visualViewport.offsetTop) : 0);
  const top = Math.max(topLimit, r.top + r.height*.18 - b.height);
  bubble.style.left = '50%';
  bubble.style.right = 'auto';
  bubble.style.top = `${top}px`;
  bubble.style.transform = 'translateX(-50%)';
}
function pickMood(){
  if (sleeping) return 'uyuyor';
  const map={yemek:'acikti',su:'susadi',enerji:'yorgun',oyun:'oyunIstiyor',tuvalet:'tuvaleti',sevgi:'ilgiIstiyor'};
  let worst=null, wv=42; for(const k in needs) if(needs[k]<wv){wv=needs[k]; worst=k;}
  return worst ? map[worst] : 'mutlu';
}
function hasUrgentNeed(){
  return Object.values(needs).some(v => v < 42);
}
function applyMoodVisual(){
  const m = action || (petting ? 'sevil' : mood);
  if (m==='mutlu') setClip('idle');
  else if (m==='oyunIstiyor') setClip('play');       // oyun isteme.mp4 - once hic tetiklenmiyordu
  else if (m==='acikti') setClip('hungry');
  else if (m==='susadi') setClip('thirsty');
  else if (m==='yorgun') setClip('tired');
  else if (m==='sevil') setClip('pet');
  else if (m==='tuvaleti') setClip('toilet');
  else if (m==='ilgiIstiyor') setClip('paw');
  else if (m==='uyuyor') setClip('sleep');
  else if (m==='ye') setClip('eat');
  else if (m==='ic') setClip('drink');
  else if (m==='top') setClip('play');
  else if (m==='topSevinc') setClip(toyKind==='plush' ? 'toyplay' : 'play');
  else if (m==='yuruyus') setClip('idle',1);
  else if (m==='kosuyor') setClip('run');
  else if (m==='topKovala') setClip(toyKind==='plush' ? 'play' : 'run');  // pelus beklerken kosu klibi girmesin
}
function moveTo(x,cb){ targetX=x; movingCb=cb||null; }
function updateMove(dt){
  const dx=targetX-dogX;
  if(Math.abs(dx)>.6){ const dir=dx>0?1:-1; facing=dir; dogX += dir*Math.min(Math.abs(dx),(action==='topKovala'?34:22)*dt); setClip('run',dir); return true; }
  if(movingCb){ const f=movingCb; movingCb=null; f(); }
  return false;
}

function toggleSleep(){ if(action)return; setPlayMenu(false); sleeping=!sleeping; playSfx(sleeping ? 'sleep' : 'bark'); $('night').style.opacity=sleeping?1:0; $('btnUyku').querySelector('.t').textContent=sleeping?'Uyandır':'Uyu'; if(!sleeping){ lastBubble=''; setBubble(pickMood()); } }

// ================= YURUYUS MINI OYUNU (ARCADE) =================
const WG_ASSETS = { walk:['yuruyus-yurume1.png','yuruyus-yurume2.png','yuruyus-yurume3.png'], jump:'yuruyus-zipla.png' };
const WG_OBSTACLES = ['yol-bank.png','yol-cit.png','yol-saksi.png','yol-cop.png'];
const WG_BONE = 'yol-kemik.png';
const WG_DOG_X = 15;
const WG_BEST_KEY = 'atlasWalkBest';

// Ziplama fizigi: birim = #wgDog elementinin kendi yuksekliginin %'si / saniye.
const WG_GRAVITY = 706;
const WG_JUMP_V0 = 247;
const WG_RISE_HOLD_MULT = .5;    // basili tutulursa yukselirken daha az yercekimi -> daha yuksek ziplama
const WG_RISE_RELEASE_MULT = 1;  // erken birakilirsa yukselirken normal yercekimi -> daha kisa (ama hala engeli asacak kadar yuksek) hoplama
const WG_FALL_MULT = 1.6;        // inis her zaman daha hizli, oyun hissini keskinlestirir
const WG_JUMP_BUFFER = .12;      // yere degmeden hemen once basilan ziplama, inince otomatik tetiklenir

let wg = null;

function wgBest(){ return parseInt(localStorage.getItem(WG_BEST_KEY)||'0',10); }

function wgFx(text,xPct,yPct,cls){
  const d = document.createElement('div');
  d.className = 'wgFx'+(cls?' '+cls:'');
  d.style.left = xPct+'%'; d.style.top = yPct+'%';
  d.textContent = text;
  $('walkGame').appendChild(d);
  setTimeout(()=>d.remove(),1150);
}

function openWalkGame(){
  if (action || sleeping || wg) return;
  setPlayMenu(false);
  wg = {
    elapsed:0, spawnT:1.2, boneT:3,
    items:[], over:false, paused:false,
    cleared:0, bones:0, pendingReward:0,
    dog:{ y:0, vy:0, jumping:false, holding:false, bufferedUntil:-1, walkT:0, walkFrame:0 },
    last:performance.now()
  };
  $('wgScene').querySelectorAll('.wgObj').forEach(n=>n.remove());
  $('wgDogImg').src = WG_ASSETS.walk[0];
  $('wgDog').style.transform = 'translateX(-50%) translateY(0)';
  $('wgScore').textContent = '0 sn';
  $('wgBest').textContent = 'En iyi: '+wgBest()+' sn';
  $('wgEndCard').classList.remove('on');
  $('wgEndBadge').style.display = 'none';
  $('walkGame').classList.add('on');
  requestAnimationFrame(wgTick);
}

function wgDoJump(){
  const d = wg.dog;
  d.jumping = true; d.vy = WG_JUMP_V0;
  $('wgDogImg').src = WG_ASSETS.jump;
  playSfx('reward');
  wgFx('💨', WG_DOG_X-3, 78);
}

function wgPressJump(){
  if (!wg || wg.over) return;
  const d = wg.dog;
  d.holding = true;
  if (d.jumping){ d.bufferedUntil = wg.elapsed + WG_JUMP_BUFFER; return; }
  wgDoJump();
}
function wgReleaseJump(){ if (wg) wg.dog.holding = false; }

function wgSpawnObstacle(x){
  const src = WG_OBSTACLES[Math.floor(Math.random()*WG_OBSTACLES.length)];
  const el = document.createElement('div');
  el.className = 'wgObj';
  el.style.right = x+'%';
  const img = document.createElement('img');
  img.src = src; img.alt = '';
  el.appendChild(img);
  $('wgScene').appendChild(el);
  wg.items.push({ el, x, kind:'obstacle', cleared:false });
}
function wgSpawnBone(x){
  const floating = Math.random() < .6;
  const el = document.createElement('div');
  el.className = 'wgObj bone '+(floating?'float':'ground');
  el.style.right = x+'%';
  const img = document.createElement('img');
  img.src = WG_BONE; img.alt = '';
  el.appendChild(img);
  $('wgScene').appendChild(el);
  wg.items.push({ el, x, kind:'bone', floating, taken:false });
}

function wgDifficultyTier(t){ return t<12 ? 0 : t<28 ? 1 : t<50 ? 2 : 3; }

function wgSpawnWave(){
  const tier = wgDifficultyTier(wg.elapsed);
  const doubleChance = [0,.22,.4,.5][tier];
  wgSpawnObstacle(-12);
  if (Math.random() < doubleChance) wgSpawnObstacle(-12 - (11+Math.random()*3));
  const base = [1.7,1.35,1.05,.85][tier];
  wg.spawnT = base + Math.random()*.55;
}

function wgRectsOverlap(a,b,ainsetX,ainsetY,binsetX,binsetY){
  const aw=a.width*ainsetX, ah=a.height*ainsetY;
  const ax0=a.left+aw, ax1=a.right-aw, ay0=a.top+ah, ay1=a.bottom-ah;
  const bw=b.width*binsetX, bh=b.height*binsetY;
  const bx0=b.left+bw, bx1=b.right-bw, by0=b.top+bh, by1=b.bottom-bh;
  return ax0<bx1 && ax1>bx0 && ay0<by1 && ay1>by0;
}

function wgTick(now){
  if (!wg) return;
  requestAnimationFrame(wgTick);
  const dt = Math.min((now-wg.last)/1000,.05); wg.last = now;
  if (wg.over || wg.paused) return;

  wg.elapsed += dt;
  $('wgScore').textContent = Math.floor(wg.elapsed)+' sn';
  const speed = Math.min(30 + wg.elapsed*.85, 92);
  const d = wg.dog;

  d.walkT += dt;
  if (!d.jumping && d.walkT > .13){
    d.walkT = 0; d.walkFrame = (d.walkFrame+1)%3;
    $('wgDogImg').src = WG_ASSETS.walk[d.walkFrame];
  }

  if (d.jumping){
    const rising = d.vy > 0;
    const gmult = rising ? (d.holding ? WG_RISE_HOLD_MULT : WG_RISE_RELEASE_MULT) : WG_FALL_MULT;
    d.vy -= WG_GRAVITY*gmult*dt;
    d.y += d.vy*dt;
    if (d.y <= 0){
      d.y = 0; d.vy = 0; d.jumping = false;
      $('wgDogImg').src = WG_ASSETS.walk[d.walkFrame];
      if (wg.elapsed <= d.bufferedUntil){ d.bufferedUntil = -1; wgDoJump(); }
    }
    $('wgDog').style.transform = 'translateX(-50%) translateY(-'+d.y+'%)';
  }

  wg.spawnT -= dt;
  if (wg.spawnT <= 0) wgSpawnWave();
  wg.boneT -= dt;
  if (wg.boneT <= 0){
    wgSpawnBone(-12 - (wg.items.length ? 8+Math.random()*6 : 0));
    wg.boneT = 4 + Math.random()*3.2;
  }

  const dogRect = $('wgDogHit').getBoundingClientRect();

  for (let i=wg.items.length-1;i>=0;i--){
    const it = wg.items[i];
    it.x += speed*dt;
    it.el.style.right = it.x+'%';
    const r = it.el.getBoundingClientRect();

    if (it.kind==='obstacle'){
      if (wgRectsOverlap(dogRect,r,.04,.04,.38,.22)){ wgGameOver(); return; }
      if (!it.cleared && it.x > WG_DOG_X+8){ it.cleared = true; wg.cleared++; }
    } else if (!it.taken && wgRectsOverlap(dogRect,r,.04,.04,.08,.08)){
      it.taken = true; wg.bones++;
      wgFx('+5 🐾', Math.max(0,100-it.x), it.floating?58:78, 'bonefx');
      it.el.remove(); wg.items.splice(i,1); continue;
    }
    if (it.x > 120){ it.el.remove(); wg.items.splice(i,1); }
  }
}

function wgGameOver(){
  if (!wg || wg.over) return;
  wg.over = true;
  playSfx('bark');
  const wgEl = $('walkGame');
  wgEl.classList.add('shake');
  setTimeout(()=>wgEl.classList.remove('shake'),340);

  const scoreSec = Math.floor(wg.elapsed);
  const best = wgBest();
  const isRecord = scoreSec > best;
  if (isRecord) localStorage.setItem(WG_BEST_KEY, String(scoreSec));

  wg.pendingReward = 10 + scoreSec + wg.cleared + wg.bones*5;
  $('wgEndBadge').style.display = isRecord ? 'block' : 'none';
  $('wgEndTitle').textContent = 'Yürüyüş bitti!';
  $('wgEndText').textContent = scoreSec+' saniye kaçtın · '+wg.cleared+' engel atladın · '+wg.bones+' kemik topladın';
  $('wgBest').textContent = 'En iyi: '+Math.max(best,scoreSec)+' sn';
  $('wgEndCard').classList.add('on');
}

function wgClose(){
  const reward = wg ? Math.round(wg.pendingReward||0) : 0;
  const survived = wg ? wg.elapsed : 0;
  $('walkGame').classList.remove('on');
  $('wgScene').querySelectorAll('.wgObj').forEach(n=>n.remove());
  wg = null;
  needs.tuvalet = Math.min(100, needs.tuvalet + Math.max(40, survived*3));
  needs.oyun = Math.min(100, needs.oyun+12);
  if (reward>0) earnPaws(reward);
  toast('Eve döndünüz!');
  saveState();
}

let petting=false,lastPet=0,petAccum=0,activePetPointer=null;
function pointInsideDog(p, pad=46){
  const r = dogWrap.getBoundingClientRect();
  return p.x>=r.left-pad && p.x<=r.right+pad && p.y>=r.top-pad && p.y<=r.bottom+pad;
}
function petAtPoint(p, force=false){
  if (sleeping || (action && action !== 'topSevinc')) return;
  if (!pointInsideDog(p)) return;
  const now=performance.now();
  if (!force && now-lastPet<82) return;
  lastPet=now;
  needs.sevgi=Math.min(100,needs.sevgi+(force ? 1.8 : 2.4));
  petAccum+=force ? 1.8 : 2.4;
  if (force || petAccum < 5) playSfx('petTap');
  fx('❤️',p.x-13+(Math.random()-.5)*30,p.y-30);
  if(petAccum>=20){petAccum=0; earnPaws(5,p.x-30,p.y-60);}
}
function startPettingAt(p, e){
  if(sleeping || (action && action !== 'topSevinc') || !pointInsideDog(p)) return;
  e?.preventDefault?.();
  petting=true;
  petAtPoint(p, true);
}
petHit.addEventListener('pointerdown',e=>{
  activePetPointer=e.pointerId;
  petHit.setPointerCapture?.(e.pointerId);
  startPettingAt({x:e.clientX,y:e.clientY}, e);
});
dogWrap.addEventListener('pointerdown',e=>{
  activePetPointer=e.pointerId;
  petHit.setPointerCapture?.(e.pointerId);
  startPettingAt({x:e.clientX,y:e.clientY}, e);
});
addEventListener('pointermove',e=>{
  if(!petting || (activePetPointer!==null && e.pointerId!==activePetPointer)) return;
  e.preventDefault();
  petAtPoint({x:e.clientX,y:e.clientY});
});
function stopPetting(e){
  if(activePetPointer!==null) petHit.releasePointerCapture?.(activePetPointer);
  petting=false; activePetPointer=null;
}
addEventListener('pointerup',stopPetting);
addEventListener('pointercancel',stopPetting);
petHit.addEventListener('lostpointercapture',stopPetting);

let last=performance.now(), hudTimer=0, zzzTimer=0, fxTimer=0;
function tick(now){
  requestAnimationFrame(tick);
  const dt=Math.min((now-last)/1000,.05); last=now; t+=dt;
  for(const k in needs){ let d=DECAY[k]*dt; if(sleeping)d*=(k==='enerji')?0:.3; needs[k]=Math.max(0,needs[k]-d); }
  if(sleeping){ needs.enerji=Math.min(100,needs.enerji+5*dt); if(needs.enerji>=100){ toggleSleep(); toast('Atlas dinlendi ve uyandı!'); } }
  const dp=dogScreenPos();
  if(action==='ye'){ needs.yemek=Math.min(100,needs.yemek+11*dt); actionTimer-=dt; if(Math.random()<dt*3)fx('🍖',dp.x+40,dp.y+120); if(actionTimer<=0){action=null; $('food').classList.remove('on'); earnPaws(10); toast('Afiyet olsun!'); moveTo(0);} }
  else if(action==='ic'){ needs.su=Math.min(100,needs.su+14*dt); actionTimer-=dt; if(Math.random()<dt*3)fx('💧',dp.x-40,dp.y+120); if(actionTimer<=0){action=null; $('water').classList.remove('on'); earnPaws(8); toast('Su çok iyi geldi!'); moveTo(0);} }
  else if(action==='topKovala'){
    const b=ballEl;
    toyThrowT+=dt;
    if(toyThrowT<.62 && toyStart && toyTarget){
      const p=Math.min(1,toyThrowT/.62);
      const ease=1-Math.pow(1-p,3);
      const arc=Math.sin(p*Math.PI)*Math.min(110,innerHeight*.18);
      const x=toyStart.x+(toyTarget.x-toyStart.x)*ease;
      const y=toyStart.y+(toyTarget.y-toyStart.y)*ease-arc;
      b.style.left=x+'px';
      b.style.top=y+'px';
      b.style.bottom='auto';
      b.style.transform=`translate(-50%,-50%) rotate(${p*420-24}deg) scale(${.88+p*.22})`;
      if (toyKind !== 'plush') moveTo(ballX);
    } else {
      if (toyTarget && toyThrowT - dt < .62) {
        const landed = (toyTarget.x / innerWidth - .5) * 100;
        ballX = Math.max(-38, Math.min(38, landed));
        ballY = 0;
      }
      ballVY+=120*dt; ballY+=ballVY*dt; ballX+=ballVX*dt; if(ballY>0){ballY=0; ballVY=-Math.abs(ballVY)*.55; ballVX*=.9;} if(ballX>36||ballX<-36)ballVX*=-1;
      b.style.left='calc(50% + '+ballX+'vw)';
      b.style.top='auto';
      b.style.bottom='calc(16% + '+(-ballY)*.35+'vh)';
      b.style.transform=`translate(-50%,50%) rotate(${t*320}deg) scale(1)`;
      if (toyKind !== 'plush') moveTo(ballX);
    }
    actionTimer-=dt; const catchRadius = toyKind==='plush' ? 9 : 5;
    const caught=toyThrowT>.65&&Math.abs(dogX-ballX)<catchRadius&&ballY>-8;
    if(caught||actionTimer<=0){ if(caught){ needs.oyun=Math.min(100,needs.oyun+(toyKind==='plush'?26:32)); needs.enerji=Math.max(0,needs.enerji-(toyKind==='plush'?5:8)); earnPaws(toyKind==='plush'?10:12); toast((TOYS[toyKind]?.label||'Oyuncak')+' yakalandı!'); action='topSevinc'; actionTimer=(toyKind==='plush'?4.6:1.3); setBubble(toyKind==='plush'?'pelus':'top'); fx('✨',dp.x-20,dp.y); fx('✨',dp.x+30,dp.y-20); } else action=null; b.classList.remove('on'); movingCb=null; targetX=dogX; if(!caught)moveTo(0); }
  } else if(action==='topSevinc'){ actionTimer-=dt; if(actionTimer<=0){ action=null; moveTo(0); } }
  else if(action==='yuruyus'){ actionTimer-=dt; if(Math.random()<dt*2)fx('✨',innerWidth*.86,innerHeight*.62); if(actionTimer<=0){ action=null; needs.tuvalet=100; earnPaws(10); toast('Rahatladı!'); setTimeout(()=>$('tree').classList.remove('on'),700); moveTo(0); } }
  const isMoving=updateMove(dt);
  dogWrap.style.transform='translateX(calc(-50% + '+dogX+'vw))';
  shadow.style.transform='translateX(calc(-50% + '+dogX+'vw))';
  if(!isMoving){ mood=pickMood(); if(!action)setBubble(petting&&!sleeping?'sevil':mood); applyMoodVisual(); }
  placeBubble();
  if(sleeping){ zzzTimer-=dt; if(zzzTimer<=0){ zzzTimer=1.2; fx('💤',dp.x+50,dp.y); } }
  if(mood==='oyunIstiyor'&&!action&&!sleeping){ fxTimer-=dt; if(fxTimer<=0){ fxTimer=2.4; fx('🎵',dp.x+(Math.random()-.5)*80,dp.y-10); } }
  drawDog(ctx,cvs); if (splashAlive) drawDog(splashCtx,splashCvs);
  hudTimer-=dt; if(hudTimer<=0){hudTimer=.25; updateHUD();}
}
$('startBtn').onclick=async()=>{
  if (startBtnEl.disabled) return;
  started=true;
  action=null; movingCb=null; dogX=0; targetX=0; facing=1;
  stopAllVideos();
  const firstVideo = videos.idle;
  const firstPlay = firstVideo.play().catch(()=>{});
  await unlockSfx();
  await firstPlay;
  const s=$('splash'); s.style.opacity=0; setTimeout(()=>{ splashAlive=false; s.remove(); },650);
  if (welcomeBackMsg){ setBubble('mutlu'); toast(welcomeBackMsg); } else setBubble('mutlu');
};
setClip('idle'); updateHUD(); requestAnimationFrame(tick); preloadAll();
</script>
