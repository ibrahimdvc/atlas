<!DOCTYPE html>

<title>ATLAS v3 - Gerçek Hareket</title>
<style>
  * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; touch-action:none; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Helvetica Neue",Arial,sans-serif; background:#fff; }
  #scene { position:fixed; inset:0; overflow:hidden; background:
    radial-gradient(circle at 50% 8%, rgba(255,193,77,.12), transparent 36%),
    linear-gradient(180deg,#fff6e8 0%, #fff 34%, #fff 100%); }
  #sun { position:absolute; right:8vw; top:7vh; width:120px; height:120px; border-radius:50%; background:radial-gradient(circle,#fff8d5 0%,#ffe49d 45%,transparent 72%); }
  .cloud { position:absolute; width:88px; height:28px; border-radius:40px; background:#fff; opacity:.82; animation:cloud 70s linear infinite; }
  .cloud:before,.cloud:after { content:""; position:absolute; border-radius:50%; background:#fff; }
  .cloud:before { width:38px; height:38px; left:14px; top:-18px; }
  .cloud:after { width:28px; height:28px; left:48px; top:-12px; }
  .c1 { top:10vh; animation-delay:-20s; }
  .c2 { top:20vh; transform:scale(.75); animation-duration:95s; animation-delay:-55s; }
  @keyframes cloud { from{ left:-130px } to{ left:110vw } }
  #sun,.cloud,#floorGlow { display:none; }

  #dogShadow { display:none; }
  #dogWrap { position:absolute; left:50%; bottom:16%; width:min(66vw,460px); aspect-ratio:960/760; transform:translateX(-50%); will-change:transform; touch-action:none; }
  #dogCanvas { position:absolute; inset:0; width:100%; height:100%; }
  #petHit { position:absolute; inset:-12% -14%; touch-action:none; }
  #videoBank { position:absolute; width:1px; height:1px; overflow:hidden; opacity:0; pointer-events:none; }

  .prop { position:absolute; bottom:15%; opacity:0; pointer-events:none; transform:scale(.45); transition:opacity .25s, transform .25s; }
  .prop.on { opacity:1; transform:scale(1); }
  #ball { position:fixed; width:46px; height:46px; border-radius:50%; background:rgba(255,255,255,.72); display:grid; place-items:center; font-size:34px; filter:drop-shadow(0 10px 10px rgba(91,65,35,.22)); transform:translate(-50%,-50%) rotate(0deg) scale(.9); transition:opacity .12s, transform .12s; }
  #tree { right:5%; bottom:13%; font-size:108px; }
  .bowl { width:86px; height:44px; }
  .bowl:before { content:""; position:absolute; left:0; bottom:0; width:86px; height:34px; border-radius:8px 8px 22px 22px; }
  .bowl:after { content:""; position:absolute; left:7px; bottom:24px; width:72px; height:18px; border-radius:50%; }
  #food { right:8%; }
  #water { left:8%; }
  #food,#water,#tree { display:none; }
  #food:before { background:linear-gradient(#ff8a65,#df4918); }
  #food:after { background:radial-gradient(ellipse,#895322 30%,#5d3517 100%); }
  #water:before { background:linear-gradient(#64b5f6,#1976d2); }
  #water:after { background:radial-gradient(ellipse,#d4f1ff 20%,#76c5f9 100%); }

  #topbar { position:fixed; top:calc(10px + env(safe-area-inset-top)); left:0; right:0; z-index:10; display:flex; justify-content:space-between; align-items:flex-start; padding:0 12px; pointer-events:none; }
  .tag,.bank,.need,#bubble { background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,248,238,.94)); border:1px solid rgba(132,96,56,.1); box-shadow:0 8px 22px rgba(91,65,35,.14); backdrop-filter:blur(8px); }
  .tag { border-radius:20px; padding:6px 18px 5px; text-align:center; box-shadow:0 9px 0 rgba(190,134,67,.14),0 14px 24px rgba(91,65,35,.13); }
  .tag .nm { color:#584434; font-size:22px; font-weight:800; line-height:1; }
  .tag .lv { color:#bf8643; font-size:12px; font-weight:800; }
  .bank { border-radius:20px; padding:8px 16px; color:#584434; font-size:18px; font-weight:800; box-shadow:0 9px 0 rgba(190,134,67,.13),0 14px 24px rgba(91,65,35,.13); }
  .needs { position:fixed; top:calc(88px + env(safe-area-inset-top)); z-index:10; display:flex; flex-direction:column; gap:10px; pointer-events:none; }
  .needs.left { left:10px; } .needs.right { right:10px; }
  .need { width:64px; border-radius:16px; padding:6px 5px 7px; text-align:center; box-shadow:0 7px 0 rgba(205,170,120,.2),0 13px 22px rgba(91,65,35,.14); }
  .need .ico { font-size:22px; line-height:1.1; }
  .need .lbl { color:#745d49; font-size:10px; font-weight:800; line-height:1.15; }
  .bar { height:8px; margin-top:3px; border-radius:6px; background:#eadfce; overflow:hidden; box-shadow:inset 0 1px 3px rgba(97,70,44,.18); }
  .fill { height:100%; width:80%; border-radius:6px; transition:width .35s, background .35s; }
  .low { animation:warn 1s infinite; }
  @keyframes warn { 50%{ box-shadow:0 0 0 4px rgba(255,80,80,.42) } }
  #bubble { position:fixed; left:50%; top:calc(92px + env(safe-area-inset-top)); z-index:9; transform:translateX(-50%); max-width:62%; border-radius:18px; padding:8px 18px; color:#594838; font-size:15px; font-weight:800; text-align:center; transition:left .18s, top .18s, transform .18s; }
  #bubble:after { content:""; position:absolute; left:50%; bottom:-8px; transform:translateX(-50%); border:9px solid transparent; border-top-color:rgba(255,255,255,.9); border-bottom:0; }
  #actions { position:fixed; left:0; right:0; bottom:calc(14px + env(safe-area-inset-bottom)); z-index:10; display:flex; justify-content:center; gap:10px; padding:0 10px; }
  .act { flex:0 1 76px; border:1px solid rgba(132,96,56,.12); border-radius:20px; padding:9px 4px 7px; background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,246,232,.95)); box-shadow:0 5px 0 rgba(180,150,110,.52),0 12px 20px rgba(91,65,35,.16); font-family:inherit; cursor:pointer; }
  .act:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(180,150,110,.56); }
  .act .i { display:block; width:38px; height:34px; margin:0 auto 1px; border-radius:14px; background:rgba(255,255,255,.72); font-size:26px; line-height:34px; box-shadow:inset 0 -2px 0 rgba(196,142,74,.12); }
  .act .t { color:#6b563f; font-size:11px; font-weight:800; }
  #playMenu { position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); z-index:22; display:grid; grid-template-columns:repeat(2,1fr); gap:8px; padding:8px; border-radius:22px; background:linear-gradient(180deg,rgba(255,255,255,.98),rgba(255,245,230,.94)); border:1px solid rgba(132,96,56,.14); box-shadow:0 14px 34px rgba(91,65,35,.2); transform:translate(-50%,14px) scale(.94); opacity:0; pointer-events:none; transition:opacity .18s, transform .18s; }
  #playMenu.on { opacity:1; pointer-events:auto; transform:translate(-50%,0) scale(1); }
  .toyChoice { min-width:92px; border:0; border-radius:16px; padding:8px 10px 7px; background:linear-gradient(180deg,#fff,#fff2dc); color:#644d37; font-family:inherit; font-size:11px; font-weight:900; box-shadow:0 4px 0 rgba(190,134,67,.28),0 9px 16px rgba(91,65,35,.12); }

  @keyframes rise { 0%{opacity:0; transform:translateY(0) scale(.6)} 18%{opacity:1; transform:translateY(-12px) scale(1.1)} 100%{opacity:0; transform:translateY(-82px) scale(.95)} }
  #night { display:none; }
  #splash { position:fixed; inset:0; z-index:50; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#fff; transition:opacity .6s; }
  #splash canvas { width:min(58vw,330px); height:min(52vw,300px); }
  #splash h1 { margin-top:8px; color:#584434; font-size:60px; font-weight:900; letter-spacing:4px; text-shadow:0 3px 0 rgba(232,134,44,.35); }
  #splash p { color:#6b563f; font-size:16px; font-weight:800; margin:4px 0 26px; }
  #startBtn { border:0; border-radius:40px; padding:15px 50px; background:linear-gradient(#ffb03a,#ff8c1a); box-shadow:0 6px 0 #d96e00,0 12px 24px rgba(217,110,0,.35); color:white; font-family:inherit; font-size:23px; font-weight:900; cursor:pointer; }
  #installTip { position:fixed; left:50%; bottom:calc(84px + env(safe-area-inset-bottom)); z-index:45; width:min(92vw,430px);
    transform:translate(-50%,18px); opacity:0; pointer-events:none; transition:opacity .25s, transform .25s;

    .needs.left { left:30px; }

  }
  @media (orientation:landscape) and (max-height:520px) {
    #topbar { top:calc(6px + env(safe-area-inset-top)); padding:0 8px; }

    #bubble:after { left:22px; bottom:-6px; transform:none; border-width:7px; border-bottom:0; }
    .needs { top:calc(50px + env(safe-area-inset-top)); gap:6px; }

    .needs.right { right:92px; }
    .need { width:52px; border-radius:12px; padding:4px 4px 5px; }
    .need .ico { font-size:16px; }
    .need .lbl { font-size:8px; }
    .bar { height:6px; margin-top:2px; }
    #dogWrap { width:min(68vw,520px); bottom:44px; }
    #actions { left:calc(96px + env(safe-area-inset-left)); right:calc(96px + env(safe-area-inset-right)); bottom:calc(8px + env(safe-area-inset-bottom)); gap:7px; padding:0; }
    #playMenu { bottom:calc(62px + env(safe-area-inset-bottom)); }
    .act { flex:0 1 58px; border-radius:14px; padding:5px 3px 4px; box-shadow:0 2px 0 rgba(180,150,110,.45),0 5px 10px rgba(0,0,0,.12); }
    .act .i { font-size:20px; }
    .act .t { font-size:9px; line-height:1.05; }
    #toast { bottom:64px; font-size:12px; padding:7px 14px; }

    #splash h1 { font-size:38px; margin-top:0; }
    #splash p { font-size:12px; margin:2px 0 12px; }
    #startBtn { font-size:16px; padding:9px 28px; box-shadow:0 4px 0 #d96e00,0 8px 18px rgba(217,110,0,.28); }
    #installTip { top:48px; bottom:auto; width:min(78vw,420px); padding:8px 38px 8px 12px; font-size:11px; border-radius:14px; }
    #installTip button { top:5px; right:6px; width:24px; height:24px; font-size:14px; }
  }
  @media (orientation:landscape) and (max-height:390px) {
    .needs.left { left:112px; }
    .needs.right { right:112px; }
    #dogWrap { width:min(70vw,500px); bottom:42px; }
    #bubble { top:calc(44px + env(safe-area-inset-top)); max-width:min(21vw,176px); }
    #actions { left:calc(128px + env(safe-area-inset-left)); right:calc(128px + env(safe-area-inset-right)); }
    #playMenu { bottom:calc(58px + env(safe-area-inset-bottom)); }
    .act { flex-basis:54px; }
  }
</style>

<body>
<div id="scene">
  <div id="sun"></div><div class="cloud c1"></div><div class="cloud c2"></div><div id="floorGlow"></div>
  <div class="prop bowl" id="food"></div><div class="prop bowl" id="water"></div><div class="prop" id="ball"></div><div class="prop" id="tree">🌳</div>
  <div id="dogShadow"></div>
  <div id="dogWrap"><canvas id="dogCanvas" width="960" height="760"></canvas><div id="petHit"></div></div>
</div>
<div id="night"></div>
<div id="videoBank"></div>

<div id="splash">
  <canvas id="splashCanvas" width="960" height="760"></canvas>
  <h1>ATLAS</h1><p>Gerçek hareketlerle oyunda seni bekliyor!</p>
  <button id="startBtn">▶ Oyuna Başla</button>
</div>

<div id="installTip"><button id="installClose" aria-label="Kapat">×</button><span id="installText"></span></div>

<div id="topbar"><div class="tag"><div class="nm">ATLAS</div><div class="lv" id="bondLv">Bağ Sv. 1</div></div><div class="bank">🐾 <span id="paws">0</span></div></div>
<div id="bubble">Merhaba!</div>
<div class="needs left">
  <div class="need" id="n-yemek"><div class="ico">🍖</div><div class="lbl">Yemek</div><div class="bar"><div class="fill"></div></div></div>
  <div class="need" id="n-su"><div class="ico">💧</div><div class="lbl">Su</div><div class="bar"><div class="fill"></div></div></div>
  <div class="need" id="n-enerji"><div class="ico">⚡</div><div class="lbl">Enerji</div><div class="bar"><div class="fill"></div></div></div>
</div>
<div class="needs right">
  <div class="need" id="n-oyun"><div class="ico">🎾</div><div class="lbl">Oyun</div><div class="bar"><div class="fill"></div></div></div>
  <div class="need" id="n-tuvalet"><div class="ico">🌳</div><div class="lbl">Tuvalet</div><div class="bar"><div class="fill"></div></div></div>
  <div class="need" id="n-sevgi"><div class="ico">💖</div><div class="lbl">Sevgi</div><div class="bar"><div class="fill"></div></div></div>
</div>
<div id="actions">
  <button class="act" id="btnYemek"><span class="i">🍖</span><span class="t">Besle</span></button>
  <button class="act" id="btnSu"><span class="i">💧</span><span class="t">Su Ver</span></button>
  <button class="act" id="btnOyun"><span class="i">🎮</span><span class="t">Oyun Oyna</span></button>
  <button class="act" id="btnTuvalet"><span class="i">🌳</span><span class="t">Yürüyüş</span></button>

  <button class="toyChoice" data-toy="plush" data-side="left"><span>🧸↖</span>Peluş Sol</button>
  <button class="toyChoice" data-toy="plush" data-side="right"><span>↗🧸</span>Peluş Sağ</button>

<div id="toast"></div>

<script>
'use strict';
const $ = id => document.getElementById(id);
const VIDEO_FILES = {
  idle:'normal duruş.mp4',
  play:'oyun isteme.mp4',
  drink:'su-icme.mp4',
  paw:'pati hareketi.mp4',
  eat:'mama-yeme.mp4',
  pet:'sevme.mp4',
  run:'kosma.mp4',
  sleep:'uyuma.mp4'
};
const VIDEO_PRELOAD_ORDER = ['pet','paw','eat','drink','run','play','sleep'];
const SFX_FILE = 'atlas_sfx_pack.mp3';
const SFX = {
  paw:{src:SFX_FILE,start:.15,duration:.75,volume:.35},
  bark:{src:SFX_FILE,start:1.55,duration:.85,volume:.42},
  reward:{src:SFX_FILE,start:6.25,duration:1.2,volume:.42},
  sleep:{src:SFX_FILE,start:8.05,duration:1.35,volume:.34},
  eat:{src:'sesler/magnific_kopek-mama-yeme-sesi_nT65AzhYQD.mp3',volume:.48},
  drink:{src:'sesler/magnific_kopek-su-icme-sesi_mCpPIq8hJQ.mp3',volume:.46},
  run:{src:'sesler/magnific_poddle-kopek-kosma-sesi-p_rlQ0kn5xtc.mp3',volume:.34},
  toilet:{src:'sesler/magnific_poddle-kopek-cis-yapma-se_62wC2poiJO.mp3',volume:.4}
};
const videos = {};
const bank = $('videoBank');
for (const [key, src] of Object.entries(VIDEO_FILES)) {
  const v = document.createElement('video');
  v.dataset.src = src;
  v.muted = true; v.loop = true; v.playsInline = true; v.preload = key === 'idle' ? 'auto' : 'none';
  if (key === 'idle') v.src = src;
  bank.appendChild(v); videos[key] = v;
}
function ensureVideo(key, eager=false) {
  const v = videos[key];
  if (!v) return null;
  if (!v.src) {
    v.src = v.dataset.src;
    v.preload = eager ? 'auto' : 'metadata';
    v.load();
  }
  return v;
}
function warmVideosSlowly() {
  let delay = 120;
  VIDEO_PRELOAD_ORDER.forEach(key => {
    setTimeout(() => ensureVideo(key, true), delay);
    delay += 650;
  });
}

const cvs = $('dogCanvas'), ctx = cvs.getContext('2d', { willReadFrequently:true });
const splashCvs = $('splashCanvas'), splashCtx = splashCvs.getContext('2d', { willReadFrequently:true });
const petHit = $('petHit');
const work = document.createElement('canvas'), wctx = work.getContext('2d', { willReadFrequently:true });
work.width = cvs.width; work.height = cvs.height;
let clip = 'idle', facing = 1, started = false, splashAlive = true;
let sfxReady=false;
const sfxPools = Object.fromEntries(Object.entries(SFX).map(([name,cue]) => [name, {
  index:0,
  items:Array.from({length:2}, () => {
    const a = new Audio(cue.src);
    a.preload = 'auto';
    a.playsInline = true;
    return a;
  })
}]));

async function unlockSfx(){
  if (sfxReady) return;
  const allPlayers = Object.values(sfxPools).flatMap(pool => pool.items);
  await Promise.all(allPlayers.map(async a => {
    try {
      a.volume = 0;
      await a.play();
      a.pause();
      a.currentTime = 0;
    } catch(e) {}
  }));
  sfxReady = true;
}
function playSfx(name){
  if (!sfxReady || !SFX[name]) return;
  const cue = SFX[name];
  const pool = sfxPools[name];
  const a = pool.items[pool.index++ % pool.items.length];
  a.pause();
  a.currentTime = cue.start || 0;
  a.volume = cue.volume;
  a.play().catch(()=>{});
  clearTimeout(a._stopTimer);
  if (cue.duration) {
    a._stopTimer = setTimeout(() => {
      a.pause();
      a.currentTime = 0;
    }, cue.duration * 1000);
  }
}

function setClip(next, face) {
  if (face) facing = face;
  if (clip === next) return;
  const prev = videos[clip];
  if (prev) prev.pause();
  clip = next;
  const v = ensureVideo(clip, true);
  if (v) {
    const playCurrent = () => { if (clip === next) v.play().catch(()=>{}); };
    try { if (v.readyState >= 2) v.currentTime = 0; } catch(e) {}
    if (started) {
      if (v.readyState >= 2) playCurrent();
      else v.addEventListener('canplay', playCurrent, {once:true});
    }
  }
}
function stopAllVideos() {
  Object.values(videos).forEach(v => {
    v.pause();
    v.currentTime = 0;
  });
}
function softCleanStudioWhite(img) {
  const d = img.data;
  for (let i=0; i<d.length; i+=4) {
    const r=d[i], g=d[i+1], b=d[i+2];
    const max=Math.max(r,g,b), min=Math.min(r,g,b);
    const spread=max-min;
    const brightness=(r+g+b)/3;
    if (brightness < 196 || spread > 42) continue;

    const whiten = Math.min(1, Math.max(0, (brightness - 196) / 42));
    d[i] = r + (255-r) * whiten;
    d[i+1] = g + (255-g) * whiten;
    d[i+2] = b + (255-b) * whiten;

    if (brightness > 216 && spread < 30) {
      const fade = Math.min(1, Math.max(0, (brightness - 216) / 30));
      d[i+3] = d[i+3] * (1 - fade * .9);
    }
  }
  return img;
}
function drawDog(targetCtx, targetCanvas) {
  const v = videos[clip] || videos.idle;
  targetCtx.fillStyle = '#fff';
  targetCtx.fillRect(0,0,targetCanvas.width,targetCanvas.height);
  if (!v.videoWidth) return;
  wctx.clearRect(0,0,work.width,work.height);
  const scale = Math.min(work.width / v.videoWidth, work.height / v.videoHeight);
  const dw = Math.round(v.videoWidth * scale);
  const dh = Math.round(v.videoHeight * scale);
  const dx = (work.width - dw)/2, dy = work.height - dh + 10;
  wctx.save();
  if (facing < 0) { wctx.translate(work.width,0); wctx.scale(-1,1); wctx.drawImage(v, work.width-dx-dw, dy, dw, dh); }
  else wctx.drawImage(v, dx, dy, dw, dh);
  wctx.restore();
  const cleaned = wctx.getImageData(0,0,work.width,work.height);
  wctx.putImageData(softCleanStudioWhite(cleaned),0,0);
  targetCtx.drawImage(work,0,0,targetCanvas.width,targetCanvas.height);
}

const needs = { yemek:78, su:74, enerji:82, oyun:55, tuvalet:70, sevgi:62 };
const DECAY = { yemek:.32, su:.42, enerji:.22, oyun:.5, tuvalet:.38, sevgi:.3 };
let paws=0, bondXP=0, bondLevel=1, mood='mutlu', action=null, sleeping=false;
let dogX=0, targetX=0, movingCb=null, t=0, actionTimer=0;
const dogWrap=$('dogWrap'), shadow=$('dogShadow'), bubble=$('bubble'), toastEl=$('toast');
const playMenu=$('playMenu'), ballEl=$('ball');
const installTip=$('installTip'), installText=$('installText'), installClose=$('installClose');
let installPromptEvent=null;
const FILLC = v => v>55 ? '#6fd66f' : v>28 ? '#ffc14d' : '#ff6b6b';
function updateHUD(){
  for (const k in needs){ const el=$('n-'+k), v=Math.round(needs[k]), f=el.querySelector('.fill'); f.style.width=v+'%'; f.style.background=FILLC(v); el.classList.toggle('low',v<28); }
  $('paws').textContent=paws; $('bondLv').textContent='Bağ Sv. '+bondLevel;
}
let toastTimer;
function toast(m){ toastEl.textContent=m; toastEl.style.opacity=1; clearTimeout(toastTimer); toastTimer=setTimeout(()=>toastEl.style.opacity=0,2200); }
function fx(ch,x,y,cls='fx'){ const d=document.createElement('div'); d.className=cls; d.textContent=ch; d.style.left=x+'px'; d.style.top=y+'px'; document.body.appendChild(d); setTimeout(()=>d.remove(),1400); }
function earnPaws(n,x=innerWidth/2-30,y=innerHeight*.4){ paws+=n; bondXP+=n; playSfx('reward'); if(bondXP>=bondLevel*100){bondXP=0; bondLevel++; toast('Bağ seviyesi arttı! Sv.'+bondLevel);} fx('+'+n+' 🐾',x,y,'floatpt'); }
function dogScreenPos(){ const r=dogWrap.getBoundingClientRect(); return {x:r.left+r.width/2,y:r.top+r.height*.25}; }
const TEXT = {
  mutlu:['Bugün harika!','Seni görünce çok mutlu oldum!','Hav hav!'],
  oyunIstiyor:['Hadi oynayalım!','Topu at!','Zıplamaya hazırım!'],
  acikti:['Karnım acıktı...','Mama kokusu mu aldım?'],
  susadi:['Biraz su lütfen?','Dilim kurudu...'],
  yorgun:['Uykum var...','Biraz dinlenmeliyim.'],
  tuvaleti:['Yürüyüşe çıkalım mı?','Dışarı çıkmam lazım!'],
  ilgiIstiyor:['Beni biraz sever misin?','Buradayım!'],
  uyuyor:['Zzz...'], ye:['Nam nam nam!'], ic:['Su çok iyi geldi!'], top:['Topu kaptım!'], pelus:['Peluşu bana at!','Onu yakalayacağım!'], yuruyus:['Ohh, rahatladım!'], sevil:['Bu çok güzel...']
};
let lastBubble='';
function setBubble(k){ if(k===lastBubble) return; lastBubble=k; const a=TEXT[k]||TEXT.mutlu; bubble.textContent=a[Math.floor(Math.random()*a.length)]; }
function placeBubble(){
  const portraitMobile = innerWidth <= 560 && innerHeight > innerWidth;
  if (!portraitMobile) {
    bubble.style.left = '';
    bubble.style.right = '';
    bubble.style.top = '';
    bubble.style.transform = '';
    return;
  }
  const r = dogWrap.getBoundingClientRect();
  const b = bubble.getBoundingClientRect();
  const topLimit = 76 + (window.visualViewport ? Math.max(0, window.visualViewport.offsetTop) : 0);
  const top = Math.max(topLimit, r.top + r.height*.18 - b.height);
  bubble.style.left = '50%';
  bubble.style.right = 'auto';
  bubble.style.top = `${top}px`;
  bubble.style.transform = 'translateX(-50%)';
}
function pickMood(){
  if (sleeping) return 'uyuyor';
  const map={yemek:'acikti',su:'susadi',enerji:'yorgun',oyun:'oyunIstiyor',tuvalet:'tuvaleti',sevgi:'ilgiIstiyor'};
  let worst=null, wv=42; for(const k in needs) if(needs[k]<wv){wv=needs[k]; worst=k;}
  return worst ? map[worst] : 'mutlu';
}
function hasUrgentNeed(){
  return Object.values(needs).some(v => v < 42);
}
function applyMoodVisual(){
  const m = action || (petting ? 'sevil' : mood);
  if (m==='mutlu') setClip('idle');
  else if (m==='oyunIstiyor') setClip('paw');
  else if (m==='acikti' || m==='susadi') setClip('paw');
  else if (m==='yorgun') setClip('paw');
  else if (m==='sevil') setClip('pet');
  else if (m==='tuvaleti') setClip('paw');
  else if (m==='ilgiIstiyor') setClip('paw');
  else if (m==='uyuyor') setClip('sleep');
  else if (m==='ye') setClip('eat');
  else if (m==='ic') setClip('drink');
  else if (m==='top' || m==='topSevinc') setClip('play');
  else if (m==='yuruyus') setClip('idle',1);
  else if (m==='kosuyor' || m==='topKovala') setClip('run');
}
function moveTo(x,cb){ targetX=x; movingCb=cb||null; }
function updateMove(dt){
  const dx=targetX-dogX;
  if(Math.abs(dx)>.6){ const dir=dx>0?1:-1; facing=dir; dogX += dir*Math.min(Math.abs(dx),(action==='topKovala'?34:22)*dt); setClip('run',dir); return true; }
  if(movingCb){ const f=movingCb; movingCb=null; f(); }
  return false;
}
function startEat(){ if(action||sleeping)return; setPlayMenu(false); playSfx('eat'); action='git'; $('food').classList.add('on'); moveTo(26,()=>{action='ye'; actionTimer=3.2; setBubble('ye');}); }
function startDrink(){ if(action||sleeping)return; setPlayMenu(false); playSfx('drink'); action='git'; $('water').classList.add('on'); moveTo(-26,()=>{action='ic'; actionTimer=2.6; setBubble('ic');}); }
let ballX=0, ballY=0, ballVX=0, ballVY=0, toyThrowT=0, toyKind='ball', toySide='right', toyStart=null, toyTarget=null;
const TOYS = {
  ball:{icon:'🎾', label:'Top'},
  plush:{icon:'🧸', label:'Peluş'}
};
function setPlayMenu(open){
  playMenu.classList.toggle('on', open);
  playMenu.setAttribute('aria-hidden', open ? 'false' : 'true');
}
function togglePlayMenu(){
  if(action||sleeping) return;
  setPlayMenu(!playMenu.classList.contains('on'));
}
function throwToy(kind='ball', side='right'){
  if(action||sleeping)return;
  setPlayMenu(false);
  playSfx('run');
  toyKind=kind;
  toySide=side;
  const toy = TOYS[toyKind] || TOYS.ball;
  const btn = $('btnOyun').getBoundingClientRect();
  const dog = dogWrap.getBoundingClientRect();
  const dir = toySide === 'left' ? -1 : 1;
  toyStart = {x:btn.left+btn.width/2, y:btn.top+btn.height*.35};
  const targetX = dir < 0 ? innerWidth*.22 : innerWidth*.78;
  toyTarget = {x:Math.max(56, Math.min(innerWidth-56, targetX)), y:dog.top+dog.height*(.62+Math.random()*.08)};
  action='topKovala'; actionTimer=12; toyThrowT=0;
  ballX=dir*(24+Math.random()*10); ballY=42; ballVX=dir*(8+Math.random()*8); ballVY=-18;
  ballEl.textContent=toy.icon;
  ballEl.classList.add('on');
  ballEl.style.left=toyStart.x+'px';
  ballEl.style.top=toyStart.y+'px';
  ballEl.style.bottom='auto';
  ballEl.style.transform='translate(-50%,-50%) rotate(-24deg) scale(.85)';
  setBubble(kind==='plush' ? 'pelus' : 'oyunIstiyor');
}
function startWalk(){ if(action||sleeping)return; setPlayMenu(false); action='git'; $('tree').classList.add('on'); moveTo(30,()=>{playSfx('toilet'); action='yuruyus'; actionTimer=2.4; setBubble('yuruyus');}); }
function toggleSleep(){ if(action)return; setPlayMenu(false); sleeping=!sleeping; playSfx(sleeping ? 'sleep' : 'bark'); $('night').style.opacity=sleeping?1:0; $('btnUyku').querySelector('.t').textContent=sleeping?'Uyandır':'Uyu'; if(!sleeping){ lastBubble=''; setBubble(pickMood()); } }
$('btnYemek').onclick=startEat; $('btnSu').onclick=startDrink; $('btnOyun').onclick=togglePlayMenu; $('btnTuvalet').onclick=startWalk; $('btnUyku').onclick=toggleSleep;
playMenu.querySelectorAll('.toyChoice').forEach(btn=>btn.onclick=()=>throwToy(btn.dataset.toy, btn.dataset.side));
document.addEventListener('pointerdown', e=>{
  if (!playMenu.classList.contains('on')) return;
  if (playMenu.contains(e.target) || $('btnOyun').contains(e.target)) return;
  setPlayMenu(false);
});

function isStandalone(){
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}
function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}
function showInstallTip(text){
  if (isStandalone() || localStorage.getItem('atlas-install-dismissed') === '1') return;
  installText.textContent = text;
  installTip.classList.add('on');
}
installClose.onclick=()=>{
  installTip.classList.remove('on');
  localStorage.setItem('atlas-install-dismissed','1');
};
window.addEventListener('beforeinstallprompt', e=>{
  e.preventDefault();
  installPromptEvent=e;
  showInstallTip('Atlas’ı uygulama gibi kullanmak için buraya dokunup yükleyebilirsin.');
});
installTip.addEventListener('click', async e=>{
  if (e.target === installClose) return;
  if (!installPromptEvent) return;
  installTip.classList.remove('on');
  installPromptEvent.prompt();
  await installPromptEvent.userChoice.catch(()=>{});
  installPromptEvent=null;
});
window.addEventListener('appinstalled', ()=>{
  installTip.classList.remove('on');
  localStorage.setItem('atlas-install-dismissed','1');
});
setTimeout(()=>{
  if (isIOS()) showInstallTip('iPhone’da uygulama gibi kullanmak için Paylaş simgesine dokun, sonra “Ana Ekrana Ekle” seç.');
}, 1800);
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
}

let petting=false,lastPet=0,petAccum=0,activePetPointer=null;
function pointInsideDog(p, pad=46){
  const r = dogWrap.getBoundingClientRect();
  return p.x>=r.left-pad && p.x<=r.right+pad && p.y>=r.top-pad && p.y<=r.bottom+pad;
}
function petAtPoint(p, force=false){
  if (sleeping || (action && action !== 'topSevinc')) return;
  if (!pointInsideDog(p)) return;
  const now=performance.now();
  if (!force && now-lastPet<82) return;
  lastPet=now;
  needs.sevgi=Math.min(100,needs.sevgi+(force ? 1.8 : 2.4));
  petAccum+=force ? 1.8 : 2.4;
  if (force || petAccum < 5) playSfx('paw');
  fx('❤️',p.x-13+(Math.random()-.5)*30,p.y-30);
  if(petAccum>=20){petAccum=0; earnPaws(5,p.x-30,p.y-60);}
}
function startPettingAt(p, e){
  if(sleeping || (action && action !== 'topSevinc') || !pointInsideDog(p)) return;
  e?.preventDefault?.();
  ensureVideo('pet', true);
  petting=true;
  petAtPoint(p, true);
}
petHit.addEventListener('pointerdown',e=>{
  activePetPointer=e.pointerId;
  petHit.setPointerCapture?.(e.pointerId);
  startPettingAt({x:e.clientX,y:e.clientY}, e);
});
dogWrap.addEventListener('pointerdown',e=>{
  activePetPointer=e.pointerId;
  petHit.setPointerCapture?.(e.pointerId);
  startPettingAt({x:e.clientX,y:e.clientY}, e);
});
addEventListener('pointermove',e=>{
  if(!petting || (activePetPointer!==null && e.pointerId!==activePetPointer)) return;
  e.preventDefault();
  petAtPoint({x:e.clientX,y:e.clientY});
});
function stopPetting(e){
  if(activePetPointer!==null) petHit.releasePointerCapture?.(activePetPointer);
  petting=false; activePetPointer=null;
}
addEventListener('pointerup',stopPetting);
addEventListener('pointercancel',stopPetting);
petHit.addEventListener('lostpointercapture',stopPetting);

let last=performance.now(), hudTimer=0, zzzTimer=0, fxTimer=0;
function tick(now){
  requestAnimationFrame(tick);
  const dt=Math.min((now-last)/1000,.05); last=now; t+=dt;
  for(const k in needs){ let d=DECAY[k]*dt; if(sleeping)d*=(k==='enerji')?0:.3; needs[k]=Math.max(0,needs[k]-d); }
  if(sleeping){ needs.enerji=Math.min(100,needs.enerji+5*dt); if(needs.enerji>=100){ toggleSleep(); toast('Atlas dinlendi ve uyandı!'); } }
  const dp=dogScreenPos();
  if(action==='ye'){ needs.yemek=Math.min(100,needs.yemek+11*dt); actionTimer-=dt; if(Math.random()<dt*3)fx('🍖',dp.x+40,dp.y+120); if(actionTimer<=0){action=null; $('food').classList.remove('on'); earnPaws(10); toast('Afiyet olsun!'); moveTo(0);} }
  else if(action==='ic'){ needs.su=Math.min(100,needs.su+14*dt); actionTimer-=dt; if(Math.random()<dt*3)fx('💧',dp.x-40,dp.y+120); if(actionTimer<=0){action=null; $('water').classList.remove('on'); earnPaws(8); toast('Su çok iyi geldi!'); moveTo(0);} }
  else if(action==='topKovala'){
    const b=ballEl;
    toyThrowT+=dt;
    if(toyThrowT<.62 && toyStart && toyTarget){
      const p=Math.min(1,toyThrowT/.62);
      const ease=1-Math.pow(1-p,3);
      const arc=Math.sin(p*Math.PI)*Math.min(110,innerHeight*.18);
      const x=toyStart.x+(toyTarget.x-toyStart.x)*ease;
      const y=toyStart.y+(toyTarget.y-toyStart.y)*ease-arc;
      b.style.left=x+'px';
      b.style.top=y+'px';
      b.style.bottom='auto';
      b.style.transform=`translate(-50%,-50%) rotate(${p*420-24}deg) scale(${.88+p*.22})`;
      moveTo(ballX);
    } else {
      if (toyTarget && toyThrowT - dt < .62) {
        const landed = (toyTarget.x / innerWidth - .5) * 100;
        ballX = Math.max(-38, Math.min(38, landed));
        ballY = 0;
      }
      ballVY+=120*dt; ballY+=ballVY*dt; ballX+=ballVX*dt; if(ballY>0){ballY=0; ballVY=-Math.abs(ballVY)*.55; ballVX*=.9;} if(ballX>36||ballX<-36)ballVX*=-1;
      b.style.left='calc(50% + '+ballX+'vw)';
      b.style.top='auto';
      b.style.bottom='calc(16% + '+(-ballY)*.35+'vh)';
      b.style.transform=`translate(-50%,50%) rotate(${t*320}deg) scale(1)`;
      moveTo(ballX);
    }
    actionTimer-=dt; const caught=toyThrowT>.65&&Math.abs(dogX-ballX)<5&&ballY>-8;
    if(caught||actionTimer<=0){ if(caught){ needs.oyun=Math.min(100,needs.oyun+(toyKind==='plush'?26:32)); needs.enerji=Math.max(0,needs.enerji-(toyKind==='plush'?5:8)); earnPaws(toyKind==='plush'?10:12); toast((TOYS[toyKind]?.label||'Oyuncak')+' yakalandı!'); action='topSevinc'; actionTimer=1.3; setBubble(toyKind==='plush'?'pelus':'top'); fx('✨',dp.x-20,dp.y); fx('✨',dp.x+30,dp.y-20); } else action=null; b.classList.remove('on'); movingCb=null; targetX=dogX; if(!caught)moveTo(0); }
  } else if(action==='topSevinc'){ actionTimer-=dt; if(actionTimer<=0){ action=null; moveTo(0); } }
  else if(action==='yuruyus'){ actionTimer-=dt; if(Math.random()<dt*2)fx('✨',innerWidth*.86,innerHeight*.62); if(actionTimer<=0){ action=null; needs.tuvalet=100; earnPaws(10); toast('Rahatladı!'); setTimeout(()=>$('tree').classList.remove('on'),700); moveTo(0); } }
  const isMoving=updateMove(dt);
  dogWrap.style.transform='translateX(calc(-50% + '+dogX+'vw))';
  shadow.style.transform='translateX(calc(-50% + '+dogX+'vw))';
  if(!isMoving){ mood=pickMood(); if(!action)setBubble(petting&&!sleeping?'sevil':mood); applyMoodVisual(); }
  placeBubble();
  if(sleeping){ zzzTimer-=dt; if(zzzTimer<=0){ zzzTimer=1.2; fx('💤',dp.x+50,dp.y); } }
  if(mood==='oyunIstiyor'&&!action&&!sleeping){ fxTimer-=dt; if(fxTimer<=0){ fxTimer=2.4; fx('🎵',dp.x+(Math.random()-.5)*80,dp.y-10); } }
  drawDog(ctx,cvs); if (splashAlive) drawDog(splashCtx,splashCvs);
  hudTimer-=dt; if(hudTimer<=0){hudTimer=.25; updateHUD();}
}
$('startBtn').onclick=async()=>{
  started=true;
  await unlockSfx();
  playSfx('bark');
  action=null; movingCb=null; dogX=0; targetX=0; facing=1;
  stopAllVideos();
  clip='idle';
  ensureVideo(clip, true);
  await videos[clip].play().catch(()=>{});
  warmVideosSlowly();
  const s=$('splash'); s.style.opacity=0; setTimeout(()=>{ splashAlive=false; s.remove(); },650); setBubble('mutlu');
};
ensureVideo('idle', true); ensureVideo('pet', true); setClip('idle'); updateHUD(); requestAnimationFrame(tick);
</script>
